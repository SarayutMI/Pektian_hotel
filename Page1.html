<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K&J CondotelRent</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --blue: #0066cc;
        --blue-dark: #004a99;
        --blue-light: #e6f2ff;
        --muted-white: rgba(255, 255, 255, 0.98);
        --text-dark: #1a3a52;
      }

      * {
        font-family: "Prompt", sans-serif;
      }

      body {
        background: var(--muted-white);
        min-height: 100vh;
        padding-top: 160px;
        color: var(--text-dark);
      }

      .navbar-container {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1030;
        background: var(--muted-white);
        border-bottom: 1px solid rgba(0, 102, 204, 0.1);
      }

      .navbar-row1 {
        padding: 15px 0;
        border-bottom: 1px solid rgba(0, 102, 204, 0.1);
      }

      .navbar-brand {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--blue-dark) !important;
      }

      .navbar-row2 {
        padding: 12px 0;
      }

      .navbar-nav .nav-link {
        color: var(--text-dark) !important;
        margin: 0 15px;
        font-weight: 500;
        transition: all 0.25s ease;
      }

      .navbar-nav .nav-link:hover {
        color: var(--blue) !important;
      }

      .btn-contact {
        background: linear-gradient(90deg, var(--blue) 0%, var(--blue-dark) 100%);
        color: #fff !important;
        padding: 8px 20px;
        border-radius: 20px;
        font-weight: 700;
      }

      .dropdown-content {
        display: none;
        position: absolute;
        top: calc(100% + 8px);
        left: 50%;
        transform: translateX(-50%);
        min-width: 200px;
        padding: 8px 0;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 8px 30px rgba(0, 102, 204, 0.12);
        z-index: 2050;
      }

      .dropdown-content.show {
        display: block;
      }

      .dropdown-content a {
        display: block;
        padding: 10px 18px;
        text-align: center;
        color: var(--text-dark);
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .dropdown-content a:hover {
        background: rgba(0, 102, 204, 0.08);
      }

      .quick-booking-banner {
        padding: px 0;
        text-align: center;
        border-top: 2px solid rgba(255,255,255,0.12);
        box-shadow: 0 2px 10px rgba(0,102,204,0.12);
      }

      .quick-booking-btn {
        padding: 10px 32px;
        font-size: 1.1rem;
        border-radius: 30px;
        background: linear-gradient(90deg, #1258a3 100%, #1258a3 100%);
        color: #fff !important;
        font-weight: 700;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
    </style>
  </head>
  <body>
    <!-- Header Navigator Bar -->
    <div class="navbar-container">
      <!-- Row 1: Logo -->
      <div class="navbar-row1">
        <div class="container">
          <a class="navbar-brand" href="index.html" style="color: #006994 !important; background: linear-gradient(135deg, #0088cc 0%, #006994 100%); padding: 20px 30px; border-radius: 8px; display: inline-block;">
            <img src="./images/logo.png" alt="K&J CondotelRent Logo" style="height: 40px; margin-right: 10px; vertical-align: middle;">
            <span style="color: white;">K&J CondotelRent</span>
          </a>
        </div>
      </div>

      <!-- Row 2: Navigation + Contact -->
      <div class="navbar-row2">
        <div class="container">
          <div class="d-flex align-items-center justify-content-between flex-wrap">
            <!-- Navigation Menu -->
            <ul class="navbar-nav ms-auto me-auto d-flex flex-row">
              <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" onclick="toggleRoomsMenu(event)">
                  ห้องพัก
                </a>
                <div id="roomsDropdownMenu" class="dropdown-content">
                  <a href="./pektian-seaview.html">ปึกเตียนซีวิว คอนโดเทล</a>
                  <a href="./copacabana-jomtien.html">โคปาคาบาน่า จอมเทียน</a>
                </div>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page4.html">ความสะดวกสบาย</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page2.html">แผนที่</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page3.html">ประกาศ</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page7.html">รีวิว</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page6.html">วิธีการจอง</a>
              </li>
            </ul>

            <!-- Contact Button -->
            <a href="./Page8.html" class="btn btn-contact">
              <i class="fas fa-phone"></i> ติดต่อเรา
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Booking Banner -->
    <div class="quick-booking-banner">
      <div class="container">
          <span>ปึกเตียนซีวิว คอนโดเทล</span>
        </a>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="container mt-5">
      <!-- เนื้อหาของคุณที่นี่ -->
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
      function toggleRoomsMenu(e) {
        e.preventDefault();
        document.getElementById("roomsDropdownMenu").classList.toggle("show");
      }

      window.onclick = function(e) {
        if (!e.target.matches('.dropdown-toggle')) {
          const menu = document.getElementById("roomsDropdownMenu");
          if (menu && menu.classList.contains("show")) {
            menu.classList.remove("show");
          }
        }
      }
    </script>
  </body>
</html>
