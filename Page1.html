<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>K&J CondotelRent</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=ibm-plex-sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --blue: #0066cc;
        --blue-dark: #004a99;
        --blue-light: #e6f2ff;
        --muted-white: rgba(255, 255, 255, 0.98);
        --text-dark: #1a3a52;
        --card-shadow: 0 10px 30px rgba(0, 102, 204, 0.08);
      }

      * {
        font-family: "Sarabun", sans-serif;
      }

      body {
        background: var(--muted-white);
        min-height: 100vh;
        padding-top: 160px;
        color: var(--text-dark);
        display: flex;
        flex-direction: column;
      }

      main {
        flex: 1;
      }

      .navbar-container {
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 1030;
        transition: all 0.3s ease;
        background: var(--muted-white);
        border-bottom: 1px solid rgba(0, 102, 204, 0.1);
      }

      .navbar-container.scrolled {
        background: var(--muted-white) !important;
        box-shadow: 0 4px 20px rgba(0, 102, 204, 0.12);
      }

      .navbar-row1 {
        padding: 15px 0;
        border-bottom: 1px solid rgba(0, 102, 204, 0.1);
        background: transparent;
      }

      .navbar-row1.scrolled {
        border-bottom-color: rgba(0, 102, 204, 0.15);
      }

      .navbar-brand {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--blue-dark) !important;
      }

      .navbar-row2 {
        padding: 12px 0;
        background: var(--muted-white);
      }

      .nav-location {
        font-weight: 600;
        color: var(--text-dark);
        margin-right: auto;
      }

      .navbar-row1 {
        max-height: 80px;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }

      .navbar-row1.scrolled {
        max-height: 0;
      }

      .navbar-nav .nav-link {
        color: var(--text-dark) !important;
        margin: 0 15px;
        font-weight: 500;
        transition: all 0.25s ease;
      }

      .navbar-nav .nav-link:hover {
        color: var(--blue) !important;
        transform: translateY(-2px);
      }

      .btn-contact {
        background: linear-gradient(90deg, var(--blue) 0%, var(--blue-dark) 100%);
        color: #fff !important;
        padding: 8px 20px;
        border-radius: 20px;
        font-weight: 700;
        border: 1px solid rgba(0, 102, 204, 0.2);
        box-shadow: 0 6px 18px rgba(0, 102, 204, 0.15);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }

      .btn-contact:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 10px 30px rgba(0, 102, 204, 0.25);
      }

      footer {
        background: linear-gradient(135deg, var(--blue-light) 0%, #ffffff 100%);
        color: var(--text-dark);
        padding: 30px 0;
        margin-top: auto;
        border-top: 1px solid rgba(0, 102, 204, 0.1);
      }

      @media (max-width: 767.98px) {
        body {
          padding-top: 140px;
        }

        .navbar-nav .nav-link {
          margin: 5px 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header Navigator Bar -->
    <div class="navbar-container" id="navbarContainer">
      <!-- Row 1: Logo -->
      <div class="navbar-row1" id="navbarRow1">
        <div class="container">
          <a class="navbar-brand" href="index.html" style="color: #006994 !important; background: linear-gradient(135deg, #0088cc 0%, #006994 100%); padding: 20px 30px; border-radius: 8px; display: inline-block; margin-right: auto;">
            <i class="fas fa-building" style="color: white;"></i> <span style="color: white;">K&J CondotelRent</span>
          </a>
        </div>
      </div>

      <!-- Row 2: Navigation + Location + Contact -->
      <div class="navbar-row2">
        <div class="container">
          <div class="d-flex align-items-center justify-content-between flex-wrap">
            <!-- Location Display -->
            <span class="nav-location" id="locationDisplay">หน้าแรก</span>

            <!-- Center Navigation Menu -->
            <ul class="navbar-nav ms-auto me-auto d-flex flex-row">
              <li class="nav-item">
                <a class="nav-link" href="./Page1.html">ห้องพัก</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page4.html">ความสะดวกสบาย</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page2.html">แผนที่</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page3.html">ประกาศ</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page7.html">รีวิว</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./Page6.html">วิธีการจอง</a>
              </li>
            </ul>

            <!-- Contact Button -->
            <a href="./Page8.html" class="btn btn-contact">
              <i class="fas fa-phone"></i> ติดต่อเรา
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content Area -->
    <main></main>

    <!-- Footer -->
    <footer class="text-center">
      <div class="container">
        <p class="mb-0">
          <p>&copy; 2020 K&J CondotelRent</p> 149 Moo 3, Puek Tian Sub district, Tha-Yang District, Phetchaburi 76130<br>Tel. 086 342 9855<br>E-mail: <a href="mailto:jew.scb18@gmail.com">jew.scb18@gmail.com</a> - All Rights Reserved
        </p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
